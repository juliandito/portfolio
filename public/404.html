<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const base = '/portfolio'
      const next = location.pathname.replace(base, '') + location.search + location.hash
      location.replace(`${base}/#${next || '/'}`)
    </script>
  </head>
  <body></body>
</html>
